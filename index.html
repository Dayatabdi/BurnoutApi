<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurnoutGuard API</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #0070f3; margin-bottom: 10px; }
        p { color: #555; margin-bottom: 5px; }
        .status {
            display: inline-block;
            background-color: #d4edda;
            color: #155724;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 BurnoutGuard API</h1>
        <p>System Backend & Database</p>
        <p>Version 1.0.0</p>
        <div class="status">● Server is Running</div>
    </div>
</body>
</html>
